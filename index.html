
<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบเบิกเวชภัณฑ์มิใช่ยา</title>
    <script>
      // Anti-FOUC script to set theme before React loads
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) { console.error('Theme script failed', e); }
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            keyframes: {
              'bounce-in': {
                '0%': { transform: 'translate(-50%, 100%)', opacity: '0' },
                '60%': { transform: 'translate(-50%, -20px)', opacity: '1' },
                '80%': { transform: 'translate(-50%, 10px)' },
                '100%': { transform: 'translate(-50%, 0)' },
              }
            },
            animation: {
              'bounce-in': 'bounce-in 0.6s cubic-bezier(0.215, 0.610, 0.355, 1.000) both',
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="./manifest.json">
    
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ระบบเบิกเวชภัณฑ์มิใช่ยา">
    <meta name="theme-color" content="#0f172a" />
    
    <style>
      body {
        font-family: 'Sarabun', sans-serif;
      }

      @media screen {
        .print-only {
          display: none !important;
        }
      }

      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      @page {
        size: A4 portrait;
        margin: 0.5cm; /* Reduced margins all around */
      }

      @media print {
        html, body {
            background-color: #fff !important;
            color: #000 !important;
            margin: 0 !important;
            padding: 0 !important;
            font-size: 12pt;
        }

        .no-print {
          display: none !important;
        }

        .print-only {
          display: block !important;
          visibility: visible !important;
          padding: 0 !important;
        }

        /* รีเซ็ตเลย์เอาท์เพื่อการพิมพ์ */
        #root, main, section {
          display: block !important;
          position: static !important;
          width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        * {
            box-shadow: none !important;
            border-radius: 0 !important;
            max-width: none !important;
            max-height: none !important;
        }

        table {
            width: 100% !important;
            border-collapse: collapse !important;
            table-layout: fixed;
            margin-bottom: 1rem;
        }
        
        th, td {
            border: 1px solid #000 !important;
            padding: 8px 4px !important;
            color: #000 !important;
            word-wrap: break-word;
            line-height: 1.2;
        }
        
        th {
            background-color: #f3f4f6 !important;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .no-border-table, .no-border-table tr, .no-border-table td {
            border: none !important;
            padding: 0 !important;
        }

        .page-break-before {
            page-break-before: always;
        }

        .break-inside-avoid {
            break-inside: avoid;
        }
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-100 text-slate-700 dark:bg-slate-900 dark:text-slate-300">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
